services:
  - type: web
    name: syuttaikinn
    runtime: node
    buildCommand: python3 -m pip install openpyxl --break-system-packages && pnpm install && pnpm build
    startCommand: python3 -m pip install openpyxl --break-system-packages --quiet && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
